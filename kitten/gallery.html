<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Kitten SMP</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Outfit:wght@700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <img src="image.png" alt="Logo"
                    style="width: 45px; height: 45px; border-radius: 8px; object-fit: cover; border: 2px solid var(--primary);">
                <div class="logo-text">
                    <h1>Kitten<span>SMP</span></h1>
                    <p>COZIEST SMP</p>
                </div>
            </div>

            <div class="season-badge">
                <i class="fa-solid fa-seedling"></i> Season 1 • Blossom
            </div>

            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="leaderboard.html">Leaderboard</a></li>
                <li><a href="store.html">Store</a></li>
                <li><a href="gallery.html" class="active">Gallery</a></li>
                <li><a href="rules.html">Rules</a></li>
            </ul>

            <div class="nav-actions">
                <div class="online-status">
                    <span class="pulse"></span> Online: ...
                </div>
                <button class="btn-primary">Join Now!</button>
            </div>
        </div>
    </nav>

    <div class="page-container">
        <div class="page-header">
            <h1>Community Gallery 📸</h1>
            <p>Beautiful moments snapped by our amazing players.</p>
        </div>

        <div class="gallery-grid">
            <div class="gallery-item" style="padding: 0; overflow: hidden;">
                <img src="gallery1.png" alt="Gallery" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
            <div class="gallery-item" style="padding: 0; overflow: hidden;">
                <img src="gallery2.png" alt="Gallery" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
            <div class="gallery-item" style="padding: 0; overflow: hidden;">
                <img src="gallery3.png" alt="Gallery" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
            <div class="gallery-item" style="padding: 0; overflow: hidden;">
                <img src="gallery4.png" alt="Gallery" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
            <div class="gallery-item" style="padding: 0; overflow: hidden;">
                <img src="gallery5.jpg" alt="Gallery" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
            <div class="gallery-item" style="padding: 0; overflow: hidden;">
                <img src="gallery6.png" alt="Gallery" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
        </div>
    </div>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
        <span class="lightbox-close">&times;</span>
        <img class="lightbox-content" id="lightbox-img">
    </div>

    <!-- Custom Cursor -->
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>
    <script src="script.js"></script>
    <script>fetch('/track',{method:'GET',keepalive:true}).catch(()=>{});</script>
</body>

</html>
